<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#bgGrad)"/>
  <!-- Grid pattern representing SkillGrid -->
  <g stroke="#00d9ff" stroke-width="2.5" fill="none" stroke-linecap="round">
    <!-- Horizontal lines -->
    <line x1="25" y1="35" x2="75" y2="35"/>
    <line x1="25" y1="50" x2="75" y2="50"/>
    <line x1="25" y1="65" x2="75" y2="65"/>
    <!-- Vertical lines -->
    <line x1="35" y1="25" x2="35" y2="75"/>
    <line x1="50" y1="25" x2="50" y2="75"/>
    <line x1="65" y1="25" x2="65" y2="75"/>
  </g>
  <!-- Connection nodes -->
  <g fill="#00d9ff">
    <circle cx="35" cy="35" r="5"/>
    <circle cx="50" cy="50" r="5"/>
    <circle cx="65" cy="65" r="5"/>
    <circle cx="35" cy="65" r="4"/>
    <circle cx="65" cy="35" r="4"/>
    <circle cx="50" cy="35" r="3"/>
    <circle cx="35" cy="50" r="3"/>
    <circle cx="65" cy="50" r="3"/>
    <circle cx="50" cy="65" r="3"/>
  </g>
  <!-- Center highlight -->
  <circle cx="50" cy="50" r="8" fill="#0f0f23" stroke="#00d9ff" stroke-width="2"/>
  <circle cx="50" cy="50" r="3" fill="#00d9ff"/>
</svg>